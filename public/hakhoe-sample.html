<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알쓰패치 샘플 배송 신청</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:16px; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background:#f5f7f5; color:#222; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:32px 20px 48px;
  }

  .card {
    background:#fff; border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
    max-width:480px; width:100%; padding:32px 28px;
  }

  .badge {
    display:inline-block; background:#e8f5e9; color:#2e7d32;
    font-size:12px; font-weight:700; padding:5px 12px;
    border-radius:20px; margin-bottom:16px; letter-spacing:.02em;
  }

  h1 {
    font-size:22px; font-weight:800; line-height:1.4;
    color:#1b5e20; margin-bottom:8px; letter-spacing:-.02em;
  }

  .subtitle {
    font-size:14px; color:#666; line-height:1.7; margin-bottom:28px;
  }

  .divider { border:none; border-top:1px solid #eee; margin:0 0 24px; }

  label {
    display:block; font-size:13px; font-weight:700;
    color:#444; margin-bottom:6px;
  }

  .required { color:#e53935; margin-left:2px; }

  input, textarea {
    width:100%; padding:13px 14px; border:1.5px solid #ddd;
    border-radius:10px; font-size:15px; font-family:inherit;
    transition:border-color .2s; outline:none;
    -webkit-appearance:none;
  }
  input:focus, textarea:focus { border-color:#43a047; }

  textarea { min-height:80px; resize:vertical; line-height:1.6; }

  .field { margin-bottom:20px; }

  .hint { font-size:12px; color:#999; margin-top:5px; }

  .submit-btn {
    width:100%; padding:15px; background:#2e7d32; color:#fff;
    border:none; border-radius:12px; font-size:16px; font-weight:700;
    cursor:pointer; transition:background .2s; margin-top:8px;
    font-family:inherit; letter-spacing:-.01em;
  }
  .submit-btn:hover { background:#1b5e20; }
  .submit-btn:disabled { background:#a5d6a7; cursor:not-allowed; }

  .privacy {
    font-size:11px; color:#aaa; text-align:center;
    margin-top:14px; line-height:1.6;
  }

  /* 완료 화면 */
  .success { display:none; text-align:center; padding:16px 0; }
  .success .icon { font-size:48px; margin-bottom:16px; }
  .success h2 { font-size:20px; font-weight:800; color:#1b5e20; margin-bottom:10px; }
  .success p { font-size:14px; color:#666; line-height:1.7; }

  /* 에러 메시지 */
  .error-msg {
    background:#ffebee; color:#c62828; font-size:13px;
    padding:10px 14px; border-radius:8px; margin-top:12px;
    display:none;
  }
</style>
</head>
<body>

<div class="card">
  <span class="badge">일터정신건강증진학회 2026</span>
  <h1>알쓰패치 무료 샘플<br>배송 신청</h1>
  <p class="subtitle">
    학회 부스에서 서명해주셔서 감사합니다.<br>
    배송 정보를 입력해주시면 샘플을 보내드립니다.
  </p>
  <hr class="divider">

  <!-- 신청 폼: Apps Script로 직접 POST (CORS 우회) -->
  <form method="POST" action="https://script.google.com/macros/s/AKfycbxm1ejrKxkqO1Q6Pi0R8LWswwm0jEPJJ60Qv6a0c4k3U74La7ceZNApZElFpf7VvobCXw/exec">
    <input type="hidden" name="action" value="학회배송신청">
    <input type="hidden" name="campaign" value="학회20260324">

    <div class="field">
      <label>이름 <span class="required">*</span></label>
      <input type="text" name="name" placeholder="홍길동" required autocomplete="name">
    </div>

    <div class="field">
      <label>소속기관명 <span class="required">*</span></label>
      <input type="text" name="org" placeholder="○○ 보건소 / ○○회사" required autocomplete="organization">
    </div>

    <div class="field">
      <label>배송 주소 <span class="required">*</span></label>
      <textarea name="address" placeholder="서울시 ○○구 ○○동 ○○로 00&#10;○○빌딩 000호 (우편번호 포함)" required></textarea>
      <p class="hint">상세 주소(층·호수)까지 입력해주세요</p>
    </div>

    <div class="field">
      <label>연락처 <span class="required">*</span></label>
      <input type="tel" name="phone" placeholder="010-0000-0000" required autocomplete="tel">
      <p class="hint">배송 관련 연락 시에만 사용됩니다</p>
    </div>

    <button type="submit" class="submit-btn">샘플 신청하기</button>
    <p class="privacy">입력하신 정보는 샘플 발송 목적으로만 사용되며<br>발송 완료 후 즉시 파기됩니다.</p>
  </form>
</div>

</body>
</html>
